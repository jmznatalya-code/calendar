<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Calendar">
  <title>Calendar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="btn-prev" aria-label="Previous" class="nav-btn">&#8249;</button>
      <div id="header-title" role="heading" aria-level="1"></div>
      <button id="btn-next" aria-label="Next" class="nav-btn">&#8250;</button>
    </header>

    <nav id="view-nav" role="tablist">
      <button role="tab" data-view="day" aria-selected="false">Day</button>
      <button role="tab" data-view="week" aria-selected="false">Week</button>
      <button role="tab" data-view="month" aria-selected="true">Month</button>
      <button role="tab" data-view="year" aria-selected="false">Year</button>
    </nav>

    <main id="view-container" role="main"></main>

    <button id="btn-today" aria-label="Go to today">Today</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
