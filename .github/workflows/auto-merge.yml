name: Auto merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if needed and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Create PR (ignore error if it already exists)
          gh pr create \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --title "Auto-merge: $BRANCH" \
            --body "Automated merge from $BRANCH" \
            2>/dev/null || true

          # Get the PR number
          PR=$(gh pr view "$BRANCH" --repo "$REPO" --json number --jq '.number')

          # Merge it
          gh pr merge "$PR" --repo "$REPO" --merge --admin
