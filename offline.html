<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Calendar — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh; min-height: 100vh;
      background: #f9fafb; color: #111827; text-align: center; padding: 24px;
    }
    svg { margin-bottom: 24px; opacity: 0.4; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
    button {
      background: #2563eb; color: #fff; border: none;
      border-radius: 24px; padding: 12px 28px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #f9fafb; }
      p { color: #9ca3af; }
    }
  </style>
</head>
<body>
  <svg width="64" height="64" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <rect width="48" height="48" rx="10" fill="#2563eb"/>
    <rect x="8" y="14" width="32" height="26" rx="3" fill="#fff"/>
    <rect x="8" y="14" width="32" height="9" rx="3" fill="#1d4ed8"/>
    <rect x="8" y="20" width="32" height="3" fill="#1d4ed8"/>
    <rect x="14" y="8" width="4" height="8" rx="2" fill="#fff"/>
    <rect x="30" y="8" width="4" height="8" rx="2" fill="#fff"/>
  </svg>
  <h1>You're offline</h1>
  <p>Check your connection and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
